steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--build-arg', 'VITE_API_URL=${_VITE_API_URL}',
      '--build-arg', 'VITE_RAZORPAY_KEY_ID=${_VITE_RAZORPAY_KEY_ID}',
      '--build-arg', 'VITE_GOOGLE_MAPS_API_KEY=${_VITE_GOOGLE_MAPS_API_KEY}',
      '-t', 'us-central1-docker.pkg.dev/${PROJECT_ID}/dhoond-repo/frontend',
      '.'
    ]
images:
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/dhoond-repo/frontend'
